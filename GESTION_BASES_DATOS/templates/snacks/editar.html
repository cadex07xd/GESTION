{% extends 'base.html' %}
{% block title %}Editar Snack · Novaventa{% endblock %}
{% block page_title %}Editar Snack{% endblock %}

{% block content %}
<div class="card" style="max-width:500px">
    <div class="card-title">Editar: {{ snack.nombre }}</div>
    <form method="POST">
        <div class="form-group">
            <label>Nombre del snack</label>
            <input type="text" name="nombre" required value="{{ snack.nombre }}">
        </div>
        <div class="form-group">
            <label>Marca</label>
            <input type="text" name="marca" required value="{{ snack.marca or '' }}">
        </div>
        <div class="grid-2">
            <div class="form-group">
                <label>Precio de venta ($)</label>
                <input type="number" name="precio" step="0.01" min="0" required value="{{ snack.precio }}">
            </div>
            <div class="form-group">
                <label>Gramos (opcional)</label>
                <input type="number" name="gramos" min="1" value="{{ snack.gramos or '' }}">
            </div>
        </div>
        <div class="flex gap-2">
            <button type="submit" class="btn btn-primary">Guardar Cambios</button>
            <a href="{{ url_for('snacks.listar_snacks') }}" class="btn btn-outline">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
